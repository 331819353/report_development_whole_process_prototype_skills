interface:
  display_name: "交付版本管理"
  short_description: "维护报表开发项目的 DELIVERY_INDEX.md 版本记忆账本、交付物索引和发布包链路"
  default_prompt: "Use $delivery-version-management when report development, prototype configuration, PRD handoff, template edits, data/API binding, validation, release readiness, artifact version alignment, or release bundle history must be tracked. Before editing an existing configured report project, read or initialize DELIVERY_INDEX.md with scripts/update_delivery_index.py --stage before. After the change, append a post-change record with changed files, impacted pages/blocks/slots/components, data/API/filter/conclusion impacts, validation, docs/prototype-data-summary.md status, code-ledger status, and next-change notes. Do not rely on chat history as the version record."
