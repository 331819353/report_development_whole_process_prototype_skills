interface:
  display_name: "报表原型模板管理"
  short_description: "选择、配置和校验可运行 Vue/Vite 报表模板，仅允许交互和注册组件示例扩展。"
  default_prompt: "Use report-prototype-template-management to select, configure, validate, and preview bundled Vue 3 + TypeScript + Vite + Element Plus + ECharts + axios report templates through the latest configurable flow. Read references/configuration-field-reference.md for field meanings, component examples, title/pill/summary configuration, component data binding, and custom ECharts development. Before editing an existing configured project, use delivery-version-management to read or initialize DELIVERY_INDEX.md and consume the latest change history. Preserve PRD RTP/PATH traces and applicable ESG/SEV/ACT/TRUST/MEET gate traces in pageLayoutConfig and blockAreaConfigMap. Treat PRD/source HTML as evidence only. Enforce template-owned shell/layout/block-area/supporting-area rules; create templateAssetUnderstandingMap from the selected template asset root before block or component selection; require pageLayoutConfig.layoutSectionMap with exact 12*K sections such as 12*2 + 12*3 + 12*3 before raw layoutRows; reject any layout row over 12 cells or total N below 8; require each blockAreaConfigMap row to declare blockCoordinate, createBlockAreaConfig config, slotCount, componentSlotPattern, and slotCoordinateList; require every componentExampleConfigMap row to map one declared slotCoordinate to component slot size, visual-type size compatibility evidence, componentExampleId, registry/export proof, props, config, and data binding; allow only interaction behavior or registered component example exceptions; require docs/prototype-data-summary.md for backend-facing data handoff and DELIVERY_INDEX.md for version memory; run ledger:init when needed and ledger:check before handoff; use __change_logs__ sidecar ledgers for changed source files; append the post-change DELIVERY_INDEX.md record before readiness."
