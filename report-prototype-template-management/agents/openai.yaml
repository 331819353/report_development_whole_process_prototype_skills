interface:
  display_name: "报表原型模板管理"
  short_description: "选择、复制、配置和校验可运行 Vue/Vite 报表模板，仅允许交互和组件内容区模板例外扩展。"
  default_prompt: "Use report-prototype-template-management to select, copy, configure, validate, and preview bundled Vue 3 + TypeScript + Vite + Element Plus + ECharts + axios report templates with implementationMode copyTemplateProject by default, while preserving PRD RTP/PATH reading-path traces and applicable ESG/SEV/ACT/TRUST/MEET executive satisfaction gate traces in pageLayoutConfig/blockLayoutTemplateMap, treating PRD/source HTML as evidence unless the latest user explicitly requests HTML/static output, rejecting blank new Vue3 projects unless documented self-development exceptions require them, enforcing template-only shell/layout/block/supporting-area rules, creating templateAssetUnderstandingMap from the selected template asset root before block or component selection, requiring pageLayoutConfig.layoutSectionMap with exact 12*K sections such as 12*2 + 12*3 + 12*3 before raw layoutRows, rejecting any layout row over 12 cells or total N below 8, requiring each blockLayoutTemplateMap row to declare direct selectable block layout Vue file + asset availability + slotCount + componentSlotPattern such as A/AB/AAB/AABBCC + slotCoordinateList and rejecting size-only SpanCCxRRLayout wrappers as ready templates, requiring every component content area row to map one declared slotCoordinate to component slot size + visual-type size compatibility evidence + a registered template and sample/source evidence, allowing only interaction behavior or component content area template exceptions, requiring docs/prototype-data-summary.md for backend-facing data handoff, running ledger:init after copy and ledger:check before handoff, and using __change_logs__ sidecar ledgers for changed source files."
