interface:
  display_name: "自助分析原型 Workflow"
  short_description: "基于 PRD 执行矩阵编排自助分析原型，覆盖数据集、字段、配置、图表切换、保存分享和运行QA。"
  default_prompt: "Use report-self-service-analysis-prototype-workflow to design or build a self-service analysis prototype from the prerequisite report-prd-document-generation PRD. Before implementation, consume report-prototype-template-management references/configuration-field-reference.md and references/configurable-zero-to-one-flow.md; read references/custom-echarts-component-example-guide.md only when customEChartExampleMap is present, and references/business-report-project-implementation-overview.md only when updating the bundled business-report demo. Before editing an existing configured project, use delivery-version-management to read or initialize DELIVERY_INDEX.md and consume the last change history. Return templateReferenceConsumption. Cover datasets, field metadata, row/column/metric/filter configuration, chart switching, TRUST result quality/source/freshness, MEET save/share/export reuse when shared upward, management-facing ESG interpretation when required, permissions, performance limits, configurable template layout/block/slot/component-example flow, Vue 3 + TypeScript + Vite + Element Plus + ECharts + axios stack, PRD/source HTML as evidence only, docs/prototype-data-summary.md backend-facing data handoff, DELIVERY_INDEX.md post-change record, and runtime QA."
