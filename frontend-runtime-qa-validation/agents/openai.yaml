interface:
  display_name: "前端运行时 QA"
  short_description: "用浏览器、截图、DOM overflow、控制台、网络、交互、多模态和现代SaaS/BI Dashboard风格契约检查验证前端运行质量。"
  default_prompt: "Use $frontend-runtime-qa-validation to run browser-based QA for runnable frontend pages, including build/start, screenshots, component crops, DOM overflow, console/network, interactions, states, modern SaaS / BI Dashboard / UI Kit style-contract evidence, visual defects, chart-engine fidelity, and readiness notes. Before readiness, run action reflection. For HTML-derived report pages, inspect whether manual SVG/canvas/DOM chart marks were copied instead of ECharts-owned options/series. For Haier/enterprise report pages, QA must check both inherited Haier application UI baseline and report-specific visual/readability gates."
