interface:
  display_name: "分析报告原型 Workflow"
  short_description: "基于 PRD 执行矩阵编排分析报告原型，覆盖结论、证据链、归因、影响、行动和运行QA。"
  default_prompt: "Use report-analysis-report-prototype-workflow to design or build an analysis report prototype from the prerequisite report-prd-document-generation PRD. Before implementation, consume report-prototype-template-management references/configuration-field-reference.md and references/configurable-zero-to-one-flow.md; read references/custom-echarts-component-example-guide.md only when customEChartExampleMap is present, and references/business-report-project-implementation-overview.md only when updating the bundled business-report demo. Before editing an existing configured project, use delivery-version-management to read or initialize DELIVERY_INDEX.md and consume the last change history. Return templateReferenceConsumption. Cover conclusion-first narrative, ESG conclusion quality, evidence chain, attribution, impact assessment, ACT action recommendations, TRUST source/freshness, MEET review/export, configurable template layout/block/slot/component-example flow, Vue 3 + TypeScript + Vite + Element Plus + ECharts + axios stack, PRD/source HTML as evidence only, docs/prototype-data-summary.md backend-facing data handoff, DELIVERY_INDEX.md post-change record, and runtime QA."
