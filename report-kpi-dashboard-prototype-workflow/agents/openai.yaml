interface:
  display_name: "指标看板原型 Workflow"
  short_description: "基于 PRD 执行矩阵编排指标看板原型，覆盖KPI、趋势排名、异常预警、下钻和运行QA。"
  default_prompt: "Use report-kpi-dashboard-prototype-workflow to design or build a KPI dashboard prototype from the prerequisite report-prd-document-generation PRD. Before implementation, consume report-prototype-template-management references/configuration-field-reference.md and references/configurable-zero-to-one-flow.md; read references/custom-echarts-component-example-guide.md only when customEChartExampleMap is present, and references/business-report-project-implementation-overview.md only when updating the bundled business-report demo. Before editing an existing configured project, use delivery-version-management to read or initialize DELIVERY_INDEX.md and consume the last change history. Return templateReferenceConsumption. Cover current-state decisions, ESG 3-second answer/30-second diagnosis/3-minute action, SEV severity, ACT closure, TRUST freshness/source, KPI dictionary, targets, trends, rankings, anomaly rules, drilldowns, filters, permissions, configurable template layout/block/slot/component-example flow, Vue 3 + TypeScript + Vite + Element Plus + ECharts + axios stack, PRD/source HTML as evidence only, docs/prototype-data-summary.md backend-facing data handoff, DELIVERY_INDEX.md post-change record, and runtime QA."
