  default_prompt: "Use $report-design-system-governance to create, audit, merge, apply, or validate reusable report design-system standards across modern SaaS / BI Dashboard / UI Kit positive style contracts, page layout, components, KPI overview cards, multi-metric overview cards, single-indicator KPI cards, KPI judgment cards for status/health/rating/gauge decisions, KPI goal execution cards for target attainment/gap/progress/milestones, KPI time-series analysis cards for trend/change/YoY-MoM/cycle/volatility/forecast decisions, KPI comparison analysis cards for direct/group/competitor/benchmark/variance decisions, ranking / leaderboard / Top N / Pareto cards, composition / share / structure / market-share / concentration cards, decomposition / attribution / contribution / hierarchy cards, distribution / interval / density / quantile / boxplot cards, anomaly / risk / warning / outlier analysis cards, volatility anomaly cards, threshold warning cards, risk matrix cards, anomaly impact assessment cards, horizontal KPI cards, axis-line diagnostic KPI cards, axis-bar diagnostic KPI cards, axis-scatter diagnostic KPI cards, spatial-map diagnostic KPI cards, paired comparison diagnostic KPI cards, charts, tables, numeric precision/display contracts, filters, states, tokens, QA, and governance. For Haier/enterprise report pages, also load $haier-enterprise-app-ui-design-spec as the inherited company UI baseline before defining report-specific extensions."
