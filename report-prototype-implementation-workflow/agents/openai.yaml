interface:
  display_name: "Report Prototype Implementation"
  short_description: "Unified workflow that consumes executable report PRDs, inventories blocks first, then implements them block by block in bundled configurable templates."
  default_prompt: "Use report-prototype-implementation-workflow only after report-prd-document-generation has produced CHILD-PRD-PROTOTYPE and execution files. Validate the PRD start gate, derive blockImplementationInventory with block count/occupancy/slots before edits, prepare the selected bundled template, then materialize pageLayoutConfig/blockAreaConfigMap/componentSlotConfigMap/componentExampleConfigMap/data/API/filter/action/interaction/conclusion rules exactly from the PRD. Implement and review one block at a time: title, pill area, summary/conclusion area, slot title, slot auxiliary information, slot chart/table/body area, interaction, filter binding, data binding, states, and validation evidence. Configure global filters/actions only after block ownership is clear. Mock API design must cover performance, scope, request params, response envelope/path, filter bindings, output fields, cache/freshness, permission/error/no-permission behavior, and mock-to-real replacement. Then handle declared custom component exceptions, run validation/build/runtime checks, update docs/prototype-data-summary.md with Metric To Interface And Source Mapping plus Mock API To HTTP API Replacement Matrix, and update DELIVERY_INDEX.md. Do not reinterpret requirements, choose report type, redesign layout, or remap components."
