interface:
  display_name: "报表 PRD 文档生成"
  short_description: "将普通报表需求转成可执行报表 PRD 包，包含需求场景理解、设计思路选择、故事线适配、源材料针对性读取分析、精简主 PRD、执行文件、必需原型子 PRD 和按范围生成的条件子 PRD。"
  default_prompt: "Use report-prd-document-generation to convert an ordinary report/dashboard PRD or business requirement into a specialized executable report-development PRD bundle before unified prototype implementation. Own intake, source evidence, assumptions/gaps, demand understanding, target reader/scenario, design thought selection, storyline adaptation, report path, filter/data design, and implementation target decisions in this PRD step. Read the skill references as canonical contracts, especially report-design-storyline-contract.md, targeted-reading-analysis-contract.md, targeted-reading-analysis-template.md, template-layout-prd-contract.md, component-mapping-prd-contract.md, metric-api-interaction-matrices.md, and report-prototype-template-management/references/configuration-field-reference.md. Do not output a single Markdown PRD: create prd/prd-main.md, required execution files, and prd/children/prd-child-prototype.md; create frontend, backend, technical-solution, and testing child PRDs only when in scope. Keep prd-main.md concise and business-readable; put executable detail in execution files and child PRDs. Default runnable prototypes to the current configurable template chain: frameworkTemplateId -> pageLayoutConfig -> blockAreaConfigMap -> componentSlotConfigMap -> componentExampleConfigMap -> optional customEChartExampleMap."
