interface:
  display_name: "报表 PRD 文档生成"
  short_description: "生成精简主 PRD + 详细子 PRD 的报表需求包，作为原型、前端、后端、技术方案、测试前置输入。"
  default_prompt: "Use report-prd-document-generation to turn a report or dashboard requirement into a layered PRD bundle. Keep the main PRD concise and human-readable: background, roles, scope, report thinking, page previews, template layout summary, metric/data/interaction summary, child PRD index, and readiness gaps only. Put executable detail in appendices and child PRDs: prototype templateAssetUnderstandingMap, exact 12*N layout proof, direct block templates, slot/component template maps, dynamic conclusion rules, metric dictionary/mounting, API/data fields, interaction payloads, Template Build Packet seed, PRD-to-workflow matrix, frontend/backend/technical/testing contracts. Default runnable prototypes to vueTemplatePrototype with copyTemplateProject and the copied Vue 3 + TypeScript + Vite + Element Plus + ECharts + axios stack; do not switch to HTML/static or new Vue3 project unless the latest explicit user request or documented self-developed exception requires it."
