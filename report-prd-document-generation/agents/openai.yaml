interface:
  display_name: "报表 PRD 文档生成"
  short_description: "将普通报表需求转成专项可执行 PRD 包，包含精简主 PRD、执行文件、必需原型子 PRD 和按范围生成的条件子 PRD。"
  default_prompt: "Use report-prd-document-generation to convert an ordinary report/dashboard PRD or business requirement into a specialized executable report-development PRD bundle before prototype workflow execution. Read report-prototype-template-management references/configuration-field-reference.md when specifying template fields, component examples, title/pill/summary configuration, component data binding, or custom ECharts gaps. Do not output a single Markdown PRD. Create prd/prd-main.md, the required execution files, and the required prd/children/prd-child-prototype.md; create frontend, backend, technical-solution, and testing child PRDs only when those downstream scopes are in scope. Keep prd-main.md concise and human-readable: background, roles, scope, report thinking, page previews, template layout summary, metric/data/interaction summary, file index, and readiness gaps only. Put executable detail in execution files and child PRDs: target specialized workflow, templateAssetUnderstandingMap, exact 12*N layout proof, block area configs, component slot maps, registered component example maps, custom ECharts gaps, dynamic conclusion rules, metric dictionary/mounting, API/data fields, interaction payloads, Template Build Packet seed, and PRD-to-workflow matrix. Default runnable prototypes to the latest configurable template flow with frameworkTemplateId, pageLayoutConfig, blockAreaConfigMap, componentSlotConfigMap, componentExampleConfigMap, optional customEChartExampleMap, and the selected Vue 3 + TypeScript + Vite + Element Plus + ECharts + axios stack."
