interface:
  display_name: "报表原型 Workflow"
  short_description: "编排报表/仪表盘/大屏原型，覆盖现代SaaS/BI Dashboard/UI Kit风格契约，默认先走原型通用设计思路，再进入类型、分析视角、组件映射、模板、实现、运行QA和URL交付。"
  default_prompt: "Use $report-design-workflow to orchestrate generic report prototype work, including modern SaaS / BI Dashboard / UI Kit style-contract mapping when requested, starting with $report-prototype-design-thinking for user/scenario/decision/action, then requirements, report type, analysis perspective and component mapping, layout, bundled template selection, implementation, runtime QA, and URL handoff. During component mapping, route KPI, ranking, composition, decomposition / attribution / contribution / hierarchy, distribution / interval / density / quantile / boxplot, chart, table, filter, state, and micro-dashboard surfaces to their owning skills. During implementation, run action reflection before key decisions. For HTML/source prototypes, treat SVG/canvas chart marks as evidence only and rebuild standard charts with ECharts. For Haier/enterprise report prototypes, inherit $haier-enterprise-app-ui-design-spec for company UI tokens, typography, color, spacing, base controls, states, and brand before applying report-specific design rules."
