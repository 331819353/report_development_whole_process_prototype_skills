interface:
  display_name: "明细报表原型 Workflow"
  short_description: "基于 PRD 执行矩阵编排明细报表原型，覆盖行粒度、筛选、表格、导出、追溯和运行QA。"
  default_prompt: "Use report-detail-report-prototype-workflow to design or build a detail report prototype from the prerequisite report-prd-document-generation PRD. Before implementation, consume report-prototype-template-management references/configuration-field-reference.md and references/configurable-zero-to-one-flow.md; read references/custom-echarts-component-example-guide.md only when customEChartExampleMap is present, and references/business-report-project-implementation-overview.md only when updating the bundled business-report demo. Before editing an existing configured project, use delivery-version-management to read or initialize DELIVERY_INDEX.md and consume the last change history. Return templateReferenceConsumption. Cover row grain, filters, table fields, sorting, pagination, TRUST source/freshness/row identity, export/audit scope, permissions, traceability, row actions, states, configurable template layout/block/slot/component-example flow, Vue 3 + TypeScript + Vite + Element Plus + ECharts + axios stack, PRD/source HTML as evidence only, docs/prototype-data-summary.md backend-facing data handoff, DELIVERY_INDEX.md post-change record, and runtime QA."
